name: CI

on:
  pull_request:
    branches: [main, dev]
  # Run on direct pushes to main/dev as a backstop so the protected
  # branches always have a green CI run on the merge commit itself, not
  # just the PR head.
  push:
    branches: [main, dev]

jobs:
  check:
    name: lint, format, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier (format check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript (typecheck)
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build
